name: Sync from Google
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config user.name "hzjnet"
          git config user.email "hzjnet@users.noreply.github.com"
          git remote add upstream https://gn.googlesource.com/gn.git || true
          git fetch upstream
          git merge upstream/master --no-edit
          git push origin master
